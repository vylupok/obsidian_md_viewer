<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian Markdown Viewer</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div>
                <h1 id="app-title">Obsidian Markdown Viewer</h1>
                <p id="app-desc">Open a vault, view .md and create new notes in Markdown.</p>
            </div>
            <div class="toolbar">
                <div class="lang-switch">
                    <label for="language-select">Language:</label>
                    <select id="language-select">
                        <option value="en" selected>English</option>
                        <option value="uk">Українська</option>
                    </select>
                </div>
                <button id="open-vault">Open vault</button>
                <button id="import-files">Import .md</button>
                <button id="import-folder">Import folder</button>
                <button id="new-note">New note</button>
                <button id="save-note">Save note</button>
            </div>
        </header>

        <main class="layout">
            <aside class="sidebar">
                <section class="panel">
                    <h2 id="files-heading">Files</h2>
                    <div id="files" class="file-list">
                        <div class="empty-state" id="empty-state">Open a folder or import files to start.</div>
                    </div>
                </section>
                <section class="panel metadata">
                    <div class="meta-row">
                        <label id="name-label">Title:</label>
                        <input id="note-title" type="text" placeholder="Untitled" />
                    </div>
                    <div class="meta-row">
                        <label id="status-label">Status:</label>
                        <span id="status">Ready</span>
                    </div>
                </section>
            </aside>

            <section class="content">
                <div class="editor-panel">
                    <div class="panel-heading with-switch">
                        <h2 id="editor-heading">Editor</h2>
                        <div class="preview-controls">
                            <span id="preview-label">Preview</span>
                            <label class="toggle-switch">
                                <input type="checkbox" id="toggle-preview" />
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                    <div class="editor-preview-wrapper">
                        <article id="preview" class="preview"></article>
                        <textarea id="editor" placeholder="Type Markdown here..."></textarea>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <input id="file-input" type="file" accept=".md" multiple hidden />
    <input id="folder-input" type="file" accept=".md" webkitdirectory directory multiple hidden />
    <script src="script.js"></script>
</body>
</html>
